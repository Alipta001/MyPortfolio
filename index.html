<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/Alipta-picture.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Alipta Ghosh showcasing React, JavaScript, AI, full-stack development, and software engineering projects."
    />
    
    <!-- Open Graph Metadata -->
    <meta property="og:title" content="Alipta Ghosh Portfolio" />
    <meta property="og:description" content="React Developer | AI Enthusiast | Full Stack Developer" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aliptaghosh.vercel.app/" />
    <meta property="og:site_name" content="Alipta Ghosh" />

    <!-- Google Structured Data (Pointed to your actual domain) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Alipta Ghosh",
      "alternateName": ["Alipta Ghosh Portfolio", "Alipta"],
      "url": "https://aliptaghosh.vercel.app/"
    }
    </script>

    <title>Alipta Ghosh | Full Stack Developer | React & AI Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
